version: "3.9"

services:
  db:
    image: postgres:15
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    container_name: ecommerce_api
    depends_on:
      - db
    ports:
      - "8001:8001"

  dashboard:
    build: ./dashboard
    container_name: ecommerce_dashboard
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  pgdata:
